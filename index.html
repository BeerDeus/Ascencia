<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#17171b">
  <title>Ascencia</title>

  <!-- PWA (temporaire, test d'affichage mobile hors Capacitor — voir sw.js) -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
  <!-- iOS : "Add to Home Screen" ignore manifest.display, ces balises pilotent le
       mode standalone/plein écran + la barre de statut sur Safari/iOS. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ascencia">
  <!-- Android/Chrome (anciens WebView) : équivalent non-standard de apple-mobile-web-app-capable. -->
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
  <link rel="stylesheet" href="css/boot.css">
</head>
<body>
  <div id="app">
    <header id="game-header" class="game-header"></header>
    <main id="view-root" class="view-root"></main>
    <nav id="subnav" class="subnav"></nav>
    <nav id="mainnav" class="mainnav"></nav>
  </div>
  <!-- Écran de boot / login : couvre tout tant que la connexion (réseau, compte,
       sync cloud) n'est pas résolue — voir components/bootScreen.js + loginScreen.js. -->
  <div id="boot-overlay" class="boot-overlay"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
